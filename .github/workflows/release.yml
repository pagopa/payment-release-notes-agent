name: Release

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "requirements.txt"
      - "cicd_contexts/**"
      - "Dockerfile"
      - "infrastructure/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  versioning:
    name: Compute version, tag & release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.semver.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get merged PR title
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_TITLE=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].title // ""')
          echo "title=$PR_TITLE" >> "$GITHUB_OUTPUT"
          echo "Merged PR title: $PR_TITLE"

      - name: Compute next semantic version
        id: semver
        run: |
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          LATEST=${LATEST:-v0.0.0}
          echo "Latest tag: $LATEST"

          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)

          TITLE="${{ steps.pr.outputs.title }}"

          if echo "$TITLE" | grep -qiE '(BREAKING CHANGE|^[a-z]+(\([^)]+\))?!:)'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            BUMP=major
          elif echo "$TITLE" | grep -qE '^feat(\([^)]+\))?:'; then
            MINOR=$((MINOR + 1)); PATCH=0
            BUMP=minor
          else
            PATCH=$((PATCH + 1))
            BUMP=patch
          fi

          TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP → $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.semver.outputs.tag }}"
          git push origin "${{ steps.semver.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.semver.outputs.tag }}" \
            --title "${{ steps.semver.outputs.tag }}" \
            --notes "$(cat <<'EOF'
          ## What's changed

          ${{ steps.pr.outputs.title }}

          **Docker image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.tag }}\`
          EOF
          )" \
            --latest

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: versioning
    permissions:
      packages: write
    if: |
      contains(toJson(github.event.commits), '"src/') ||
      contains(toJson(github.event.commits), '"requirements.txt') ||
      contains(toJson(github.event.commits), '"cicd_contexts/') ||
      contains(toJson(github.event.commits), '"Dockerfile') ||
      contains(toJson(github.event.commits), '"infrastructure/local_server.py')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ needs.versioning.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
