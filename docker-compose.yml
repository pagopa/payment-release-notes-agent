services:
  app:
    build:
      context: .
      target: local        # uses the FastAPI stage — native ARM64/AMD64, no Azure runtime
    ports:
      - "7071:7071"
    env_file: .env         # loads GITHUB_TOKEN, LLM_PROVIDER, etc.
    volumes:
      - ./cicd_contexts:/app/cicd_contexts   # local-only: inspect auto-generated context files on the host
